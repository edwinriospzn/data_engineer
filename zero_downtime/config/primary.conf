# ============================================
# PRIMARY DATABASE CONFIGURATION
# Physical Replication - Streaming Replication
# ============================================

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Settings (minimal for lab)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ============================================
# REPLICATION SETTINGS - CRITICAL FOR PHYSICAL REPLICATION
# ============================================

# WAL Level - Must be 'replica' or 'logical'
# 'replica' is sufficient for physical replication
wal_level = replica

# How many standby servers can connect
max_wal_senders = 10

# How much WAL to keep for replicas (minimum 1GB recommended)
wal_keep_size = 1GB

# Replication slots prevent WAL removal until standby receives it
max_replication_slots = 10

# WAL buffer size
wal_buffers = 16MB

# ============================================
# CHECKPOINT SETTINGS
# ============================================

checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 1GB

# ============================================
# LOGGING
# ============================================

log_destination = 'stderr'
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_replication_commands = on

# ============================================
# HOT STANDBY - Primary must be ready for standbys
# ============================================

# Allow hot standby connections
hot_standby = on

# ============================================
# AUTHENTICATION
# ============================================

# Password for replication user (set via init script)
# pg_hba.conf will be configured via init script