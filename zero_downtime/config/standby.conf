# ============================================
# STANDBY DATABASE CONFIGURATION
# Physical Replication - Hot Standby
# ============================================

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory Settings (minimal for lab)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ============================================
# REPLICATION SETTINGS
# ============================================

# WAL Level - Same as primary
wal_level = replica

# Standby needs to receive WAL
# Must be >= the primary's max_wal_senders value
max_wal_senders = 10
wal_keep_size = 1GB
max_replication_slots = 10

# ============================================
# HOT STANDBY - Allow read-only queries
# ============================================

# CRITICAL: Allows read-only queries on standby
hot_standby = on

# How long to wait for WAL to apply before timing out
wal_receiver_timeout = 60s

# ============================================
# LOGGING
# ============================================

log_destination = 'stderr'
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on